version: '3.8'

services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mirror-bot
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
    volumes:
      - ../data:/app/data
      - /tmp/mirrorbot:/tmp/mirrorbot
    depends_on:
      - redis
      - aria2c
      - rclone
    networks:
      - mirror-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: mirror-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - mirror-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  aria2c:
    image: wahyd4/aria2-ui:latest
    container_name: mirror-aria2c
    restart: unless-stopped
    ports:
      - "6800:6800"
      - "6880:80"
    volumes:
      - /tmp/mirrorbot:/data
    environment:
      - SECRET=your_aria2c_secret
    networks:
      - mirror-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:6800/jsonrpc"]
      interval: 30s
      timeout: 10s
      retries: 3

  rclone:
    image: rclone/rclone:latest
    container_name: mirror-rclone
    restart: unless-stopped
    command: rcd --rc-addr=0.0.0.0:5572 --rc-user=admin --rc-pass=admin --rc-no-auth=false
    ports:
      - "5572:5572"
    volumes:
      - rclone-data:/config/rclone
      - /tmp/mirrorbot:/data
    networks:
      - mirror-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:5572/core/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-data:
  rclone-data:

networks:
  mirror-network:
    driver: bridge
